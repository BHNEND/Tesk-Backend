name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install

      - name: Build backend
        run: npm run build

      - name: Sync API docs
        run: cp docs/api.md admin/public/api.md

      - name: Install frontend dependencies
        run: cd admin && npm install

      - name: Build frontend
        run: cd admin && npm run build

      - name: Package deploy bundle
        run: |
          mkdir -p deploy/admin/dist deploy/prisma
          cp -r dist deploy/
          cp -r admin/dist/* deploy/admin/dist/
          cp prisma/schema.prisma deploy/prisma/
          cp package.json package-lock.json .env.example ecosystem.config.cjs deploy/
          cd deploy && tar -czf ../tesk-deploy.tar.gz .

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: tesk-deploy.tar.gz
          target: /tmp

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /www/wwwroot/tesk-backend
            tar -xzf /tmp/tesk-deploy.tar.gz
            npm install --production
            npx prisma generate
            mkdir -p storage
            pm2 restart tesk-backend || pm2 start ecosystem.config.cjs
            rm -f /tmp/tesk-deploy.tar.gz

      - name: Health check
        run: |
          sleep 3
          curl -sf https://api.lookai.space/health || exit 1
