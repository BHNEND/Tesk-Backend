name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install

      - name: Build backend
        run: npm run build

      - name: Sync API docs
        run: cp docs/api.md admin/public/api.md

      - name: Install frontend dependencies
        run: cd admin && npm install

      - name: Build frontend
        run: cd admin && npm run build

      - name: Package deploy bundle
        run: |
          mkdir -p deploy/admin/dist deploy/prisma
          cp -r dist deploy/
          cp -r admin/dist/* deploy/admin/dist/
          cp prisma/schema.prisma deploy/prisma/
          cp package.json package-lock.json .env.example ecosystem.config.cjs deploy/
          cd deploy && tar -czf ../tesk-deploy.tar.gz .

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: tesk-deploy.tar.gz
          target: /tmp

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /www/wwwroot/tesk-backend
            cp -r dist dist-backup 2>/dev/null || true
            tar -xzf /tmp/tesk-deploy.tar.gz
            npm install --production
            npx prisma generate
            npx prisma db push --accept-data-loss
            mkdir -p storage
            pm2 restart tesk-api tesk-worker tesk-app-worker tesk-timeout || pm2 start ecosystem.config.cjs
            pm2 save
            rm -f /tmp/tesk-deploy.tar.gz

      - name: Smoke test
        run: |
          sleep 5
          echo "1/5 Health check..."
          curl -sf https://api.lookai.space/health || (echo "FAIL: /health"; exit 1)
          echo "2/5 Stats..."
          curl -sf -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" https://api.lookai.space/api/v1/admin/stats || (echo "FAIL: /admin/stats"; exit 1)
          echo "3/5 Task list..."
          curl -sf -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" "https://api.lookai.space/api/v1/admin/tasks?page=1&pageSize=1" || (echo "FAIL: /admin/tasks"; exit 1)
          echo "4/5 Analytics..."
          curl -sf -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" https://api.lookai.space/api/v1/admin/analytics || (echo "FAIL: /admin/analytics"; exit 1)
          echo "5/5 Queue stats..."
          curl -sf -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" https://api.lookai.space/api/v1/admin/queue-stats || (echo "FAIL: /admin/queue-stats"; exit 1)
          echo "All smoke tests passed!"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /www/wwwroot/tesk-backend
            if [ -d dist-backup ]; then
              rm -rf dist
              mv dist-backup dist
              pm2 restart tesk-api tesk-worker tesk-app-worker tesk-timeout
              echo "Rollback completed"
            else
              echo "No backup found, skipping rollback"
            fi
