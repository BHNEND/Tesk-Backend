services:
  db:
    image: mysql:8.0
    container_name: tesk-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-tesk_default_password}
      MYSQL_DATABASE: ${DB_NAME:-tesk}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tesk-network

  redis:
    image: redis:7-alpine
    container_name: tesk-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tesk-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tesk-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tesk-network

volumes:
  mysql_data:
  redis_data:

networks:
  tesk-network:
    driver: bridge
